groups:
  - name: geobottle-baseline-alerts
    rules:
      - alert: GeoBottleHighServerErrorRatio
        expr: |
          (
            sum(rate(geobottle_http_requests_total{status_code=~"5.."}[5m]))
            /
            clamp_min(sum(rate(geobottle_http_requests_total[5m])), 1)
          ) > 0.02
        for: 10m
        labels:
          severity: critical
          service: geobottle-backend
        annotations:
          summary: "GeoBottle 5xx ratio is above 2%"
          description: "Server-side error ratio stayed above 2% for 10 minutes."

      - alert: GeoBottleHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(geobottle_http_request_duration_ms_bucket[5m])) by (le)
          ) > 300
        for: 10m
        labels:
          severity: warning
          service: geobottle-backend
        annotations:
          summary: "GeoBottle p95 latency exceeds 300ms"
          description: "Global HTTP p95 latency stayed above 300ms for 10 minutes."

      - alert: GeoBottleHighLoginFailureRatio
        expr: |
          (
            sum(rate(geobottle_auth_login_failures_total[5m]))
            /
            clamp_min(sum(rate(geobottle_http_requests_total{route="/api/auth/login"}[5m])), 1)
          ) > 0.20
        for: 10m
        labels:
          severity: warning
          service: geobottle-backend
        annotations:
          summary: "GeoBottle login failure ratio is above 20%"
          description: "Login failures (invalid + blocked) stayed above 20% for 10 minutes."

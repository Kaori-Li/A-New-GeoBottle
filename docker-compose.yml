version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: geobottle-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: geobottle-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/geobottle
      PORT: 3000
      NODE_ENV: development
      JWT_SECRET: change_me_in_production
      CONTENT_ENCRYPTION_KEY: Z2VvYm90dGxlX2Rldl9jb250ZW50X2tleV8zMl9ieXRlcw==
    ports:
      - "3000:3000"

volumes:
  mongo_data:

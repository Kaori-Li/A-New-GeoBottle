# 开启 Gradle Daemon，提高重复构建效率。
org.gradle.daemon=true

# 配置 JVM 内存，减少大工程编译 OOM 风险。
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8

# 启用 AndroidX 支持库体系。
android.useAndroidX=true

# 启用 Jetifier，兼容仍使用旧 support 包的依赖。
android.enableJetifier=true

# 启用并行构建（在依赖条件允许时提速）。
org.gradle.parallel=true

# React Native 新架构开关（MVP 阶段默认关闭，降低接入复杂度）。
newArchEnabled=false

# Hermes 引擎开关（默认开启以提升运行性能）。
hermesEnabled=true
